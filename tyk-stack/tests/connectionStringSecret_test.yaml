# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
#
# Locks the MDCB connectionString contract introduced in TT-17018:
#   - default (no secret name)  -> literal env value, unchanged behaviour
#   - secret name set           -> valueFrom.secretKeyRef rendered, no literal value
#   - secret key omitted        -> defaults to "connectionString"
#
# Guards against a regression in the {{ if .connectionStringSecretName }} branch
# of components/tyk-gateway/templates/deployment-gw-repset.yaml.
suite: Gateway TYK_GW_SLAVEOPTIONS_CONNECTIONSTRING source
templates:
  - charts/tyk-gateway/templates/deployment-gw-repset.yaml
  - charts/tyk-gateway/templates/secrets.yaml
release:
  name: tyk-stack
  namespace: test
tests:
  - it: renders the literal connectionString value when no secret is configured
    values:
      - ../values.yaml
    set:
      global.remoteControlPlane.enabled: true
      global.remoteControlPlane.connectionString: "tcp://mdcb.example:9091"
    template: charts/tyk-gateway/templates/deployment-gw-repset.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TYK_GW_SLAVEOPTIONS_CONNECTIONSTRING
            value: "tcp://mdcb.example:9091"

  - it: renders valueFrom.secretKeyRef when connectionStringSecretName is set
    values:
      - ../values.yaml
    set:
      global.remoteControlPlane.enabled: true
      global.remoteControlPlane.connectionStringSecretName: "mdcb-conn"
      global.remoteControlPlane.connectionStringSecretKey: "url"
    template: charts/tyk-gateway/templates/deployment-gw-repset.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TYK_GW_SLAVEOPTIONS_CONNECTIONSTRING
            valueFrom:
              secretKeyRef:
                name: mdcb-conn
                key: url

  - it: defaults the secret key to "connectionString" when only name is set
    values:
      - ../values.yaml
    set:
      global.remoteControlPlane.enabled: true
      global.remoteControlPlane.connectionStringSecretName: "mdcb-conn"
    template: charts/tyk-gateway/templates/deployment-gw-repset.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TYK_GW_SLAVEOPTIONS_CONNECTIONSTRING
            valueFrom:
              secretKeyRef:
                name: mdcb-conn
                key: connectionString
