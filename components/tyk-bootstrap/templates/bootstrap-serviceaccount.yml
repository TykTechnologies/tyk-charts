{{- if .Values.bootstrap -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ default "k8s-bootstrap-role" .Values.bootstrap.serviceAccountName | quote }}
  annotations:
    {{- if not .Values.bootstrap.disableHelmHooks }}
    helm.sh/hook: pre-install
    helm.sh/hook-delete-policy: before-hook-creation
    helm.sh/hook-weight: "-10"
    {{- end }}
    {{- with .Values.bootstrap.rbacAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
